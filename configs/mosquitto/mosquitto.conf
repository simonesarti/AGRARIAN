persistence true
persistence_location /mosquitto/data/

log_type subscribe
log_type unsubscribe
log_type error
log_type warning
log_type notice
log_type information

log_dest stdout
log_dest file /mosquitto/log/mosquitto.log

allow_anonymous true

listener 1883 0.0.0.0

# ── MQTTS — MQTT over TLS (port 8883) ────────────────────────────────────────
# To enable:
#   1. Place your CA cert and server cert/key under certificates/mosquitto/ in
#      the project root (ca.crt, server.crt, server.key).
#   2. Uncomment the block below.
#   3. In docker-compose.yml, uncomment the 8883 port and the certs volume mount
#      on the mosquitto service (see comments there).
#
# listener 8883 0.0.0.0
# cafile  /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile  /mosquitto/certs/server.key
# tls_version tlsv1.2
#
# Clients must present a valid cert signed by the CA (mutual TLS).
# Set to false to allow clients without a certificate (server-only TLS).
# require_certificate false
#
# Recommended: disable anonymous auth on the secure listener and require
# username/password (create the file with: mosquitto_passwd -c passwd <user>).
# allow_anonymous false
# password_file /mosquitto/config/passwd
